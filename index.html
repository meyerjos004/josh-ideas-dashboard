<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josh's Ideas Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f15 0%, #1a1625 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
            animation: slideDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            color: #f0f0f0;
        }

        .subtitle {
            color: #a0a0a8;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .header-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .refresh-btn {
            padding: 10px 18px;
            background: rgba(100, 150, 255, 0.15);
            color: #6496ff;
            border: 1px solid rgba(100, 150, 255, 0.4);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: rgba(100, 150, 255, 0.25);
            border-color: rgba(100, 150, 255, 0.6);
        }

        .refresh-btn.loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease-out;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6496ff 0%, #64d5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #a0a0a8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 60px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: rgba(100, 150, 255, 0.5);
            background: rgba(100, 150, 255, 0.08);
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.2);
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            color: #a0a0a8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 10px;
            font-weight: 600;
        }

        button {
            padding: 11px 16px;
            background: rgba(255, 255, 255, 0.06);
            color: #c0c0c8;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #e0e0e0;
        }

        button.active {
            background: rgba(100, 150, 255, 0.2);
            border-color: rgba(100, 150, 255, 0.5);
            color: #6496ff;
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.2);
        }

        .sort-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            padding: 11px 14px;
            background: rgba(255, 255, 255, 0.06);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        select:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        select:focus {
            outline: none;
            border-color: rgba(100, 150, 255, 0.5);
        }

        /* 3D Carousel Container */
        .carousel-3d-container {
            perspective: 1200px;
            margin-bottom: 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            padding: 20px 0;
        }

        .category-card-3d {
            perspective: 1200px;
            height: 550px;
            position: relative;
            cursor: pointer;
        }

        .category-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
            transform: rotateX(0deg) rotateY(0deg);
        }

        .category-card-3d:hover .category-card-inner {
            transform: rotateY(15deg) rotateX(-5deg);
        }

        .category-card-front {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #6496ff 0%, rgba(100, 150, 255, 0.15) 40%, rgba(100, 150, 255, 0.08) 100%);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .category-card-front-banner {
            background: #6496ff;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .category-card-front-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 30px 20px;
            text-align: center;
        }

        .category-card-3d.granola .category-card-front {
            background: linear-gradient(180deg, #4ade80 0%, rgba(74, 222, 128, 0.15) 40%, rgba(74, 222, 128, 0.08) 100%);
            border-color: rgba(74, 222, 128, 0.3);
        }

        .category-card-3d.granola .category-card-front-banner {
            background: #4ade80;
        }

        .category-card-3d.littlebird .category-card-front {
            background: linear-gradient(180deg, #c084fc 0%, rgba(192, 132, 252, 0.15) 40%, rgba(192, 132, 252, 0.08) 100%);
            border-color: rgba(192, 132, 252, 0.3);
        }

        .category-card-3d.littlebird .category-card-front-banner {
            background: #c084fc;
        }

        .category-circle-large {
            display: none;
        }

        .category-name-large {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .category-count {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .category-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 30px 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .back-content {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
        }

        .back-content::-webkit-scrollbar {
            width: 6px;
        }

        .back-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .back-content::-webkit-scrollbar-thumb {
            background: rgba(100, 150, 255, 0.3);
            border-radius: 10px;
        }

        .back-content::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 150, 255, 0.5);
        }

        .ideas-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .idea-item-compact {
            background: rgba(255, 255, 255, 0.04);
            border-left: 3px solid #6496ff;
            border-radius: 8px;
            padding: 12px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }

        .idea-item-compact.granola {
            border-left-color: #4ade80;
        }

        .idea-item-compact.littlebird {
            border-left-color: #c084fc;
        }

        .idea-item-compact:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .idea-item-name {
            font-weight: 700;
            color: #f0f0f0;
            margin-bottom: 4px;
        }

        .idea-item-desc {
            color: #a0a0a8;
            font-size: 0.8rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .idea-item-meta {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            font-size: 0.75rem;
            color: #888;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a8;
            font-size: 1.1rem;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 800;
            color: #f0f0f0;
        }

        .modal-close {
            background: none;
            border: none;
            color: #a0a0a8;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            color: #f0f0f0;
            transform: rotate(90deg);
        }

        .modal-meta-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-meta-item {
            display: flex;
            flex-direction: column;
        }

        .modal-meta-label {
            font-size: 0.75rem;
            color: #a0a0a8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .modal-meta-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #6496ff;
        }

        .modal-description {
            font-size: 1rem;
            color: #c0c0c8;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .modal-tags-section {
            margin-top: 30px;
        }

        .modal-tags-label {
            display: block;
            font-size: 0.85rem;
            color: #a0a0a8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .modal-tag {
            background: rgba(100, 150, 255, 0.15);
            color: #6496ff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(100, 150, 255, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 150, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Josh's Ideas</h1>
            <p class="subtitle">3D Carousel of Innovation</p>
            <div class="header-controls">
                <button class="refresh-btn" onclick="refreshIdeas()">🔄 Refresh</button>
            </div>
        </header>

        <div class="stats-bar" id="statsBar"></div>

        <div class="controls">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search ideas..." onkeyup="renderIdeas()">
            </div>
            <div class="filter-buttons">
                <span class="filter-label">Priority:</span>
                <button onclick="toggleFilter('priority', 'P1')" data-filter="priority-P1">P1</button>
                <button onclick="toggleFilter('priority', 'P2')" data-filter="priority-P2">P2</button>
                <button onclick="toggleFilter('priority', 'P3')" data-filter="priority-P3">P3</button>
                <button onclick="toggleFilter('priority', 'P4')" data-filter="priority-P4">P4</button>
                <button onclick="toggleFilter('priority', 'P5')" data-filter="priority-P5">P5</button>
            </div>
            <div class="sort-controls">
                <span class="filter-label">Sort by:</span>
                <select id="sortBy" onchange="renderIdeas()">
                    <option value="name">Name (A-Z)</option>
                    <option value="priority">Priority</option>
                    <option value="impact">Impact (High)</option>
                </select>
            </div>
        </div>

        <div id="content"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 class="modal-title" id="modalTitle"></h2>
                </div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1UA_TX0lA3xwHQHY9k0gIprfkZ9W05nD2tSBEURamuqQ';
        const QUERY_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=0&tq=SELECT A,B,C,D,E`;

        let allIdeas = [];
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        const activeFilters = new Map();
        const categoryIcons = {
            'AI Tools': '🤖'
        };

        const toolInfo = {
            'Wisprflow': { brand: 'wisprflow', status: 'IDEATING', tags: ['Voice-to-text', 'AI', 'Productivity'], metrics: { impact: 9, difficulty: 'Medium' } },
            'Granola': { brand: 'granola', status: 'IDEATING', tags: ['Meeting Notes', 'Transcription', 'Search'], metrics: { impact: 8, difficulty: 'Medium' } },
            'Littlebird': { brand: 'littlebird', status: 'IDEATING', tags: ['AI Assistant', 'Screen Reading', 'Memory'], metrics: { impact: 10, difficulty: 'Hard' } }
        };

        async function fetchIdeas() {
            try {
                const response = await fetch(QUERY_URL);
                const text = await response.text();
                const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/);

                if (!jsonMatch) {
                    console.error('No data found');
                    return;
                }

                const data = JSON.parse(jsonMatch[1]);
                if (data.status !== 'ok') {
                    console.error('Query error:', data.message);
                    return;
                }

                allIdeas = data.table.rows.slice(1).map((row, idx) => {
                    const category = row.c[0]?.v || 'Other';
                    const name = row.c[1]?.v || '';
                    const description = row.c[2]?.v || '';
                    const priority = parseInt(row.c[3]?.v || '3');
                    const fullDescription = row.c[4]?.v || description;

                    const info = toolInfo[name] || { brand: 'default', status: 'IDEATING', tags: [], metrics: { impact: 5, difficulty: 'Medium' } };

                    return {
                        id: idx,
                        category,
                        name,
                        description,
                        fullDescription,
                        priority,
                        ...info
                    };
                });

                renderIdeas();
            } catch (error) {
                console.error('Error fetching ideas:', error);
                document.getElementById('content').innerHTML = '<div class="empty-state"><p>Error loading ideas. Please refresh.</p></div>';
            }
        }

        function toggleFilter(type, value) {
            const key = `${type}-${value}`;
            const btn = document.querySelector(`[data-filter="${key}"]`);

            if (activeFilters.has(key)) {
                activeFilters.delete(key);
                btn.classList.remove('active');
            } else {
                activeFilters.set(key, true);
                btn.classList.add('active');
            }
            renderIdeas();
        }

        function filterIdeas() {
            return allIdeas.filter(idea => {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const matchesSearch = idea.name.toLowerCase().includes(searchTerm) ||
                                    idea.description.toLowerCase().includes(searchTerm);

                const priorityFilters = Array.from(activeFilters.keys()).filter(k => k.startsWith('priority-'));
                const matchesPriority = priorityFilters.length === 0 ||
                                       priorityFilters.some(f => f === `priority-P${idea.priority}`);

                return matchesSearch && matchesPriority;
            });
        }

        function sortIdeas(ideas) {
            const sortBy = document.getElementById('sortBy').value;
            const sorted = [...ideas];

            switch(sortBy) {
                case 'priority':
                    sorted.sort((a, b) => a.priority - b.priority);
                    break;
                case 'impact':
                    sorted.sort((a, b) => (b.metrics?.impact || 5) - (a.metrics?.impact || 5));
                    break;
                case 'name':
                default:
                    sorted.sort((a, b) => a.name.localeCompare(b.name));
            }

            return sorted;
        }

        function groupByCategory(ideas) {
            return ideas.reduce((acc, idea) => {
                if (!acc[idea.category]) acc[idea.category] = [];
                acc[idea.category].push(idea);
                return acc;
            }, {});
        }

        function renderIdeas() {
            const filtered = filterIdeas();
            const sorted = sortIdeas(filtered);
            const content = document.getElementById('content');

            if (sorted.length === 0) {
                content.innerHTML = '<div class="empty-state"><p>No ideas match your filters.</p></div>';
                return;
            }

            const grouped = groupByCategory(sorted);
            const categories = Object.keys(grouped).sort();

            const html = categories.map(category => {
                const ideas = grouped[category];
                const icon = categoryIcons[category] || '✨';

                return `
                    <div class="category-card-3d ${ideas[0].brand}">
                        <div class="category-card-inner">
                            <!-- Front Face -->
                            <div class="category-card-front">
                                <div class="category-card-front-banner">
                                    <div class="category-name-large">${escapeHtml(category)}</div>
                                    <div class="category-count">${ideas.length} ideas</div>
                                </div>
                                <div class="category-card-front-content">
                                </div>
                            </div>
                            <!-- Back Face (Ideas List) -->
                            <div class="category-card-back">
                                <div class="back-content">
                                    <div class="ideas-list">
                                        ${ideas.map(idea => `
                                            <div class="idea-item-compact ${idea.brand}" onclick="openModal(event, ${idea.id})">
                                                <div class="idea-item-name">${escapeHtml(idea.name)}</div>
                                                <div class="idea-item-desc">${escapeHtml(idea.description)}</div>
                                                <div class="idea-item-meta">
                                                    <span>P${idea.priority}</span>
                                                    <span>Impact: ${idea.metrics?.impact || 5}/10</span>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            content.innerHTML = `<div class="carousel-3d-container">${html}</div>`;
            renderStats();
        }

        function renderStats() {
            const total = allIdeas.length;
            const favorited = allIdeas.filter(i => favorites.includes(i.id)).length;

            document.getElementById('statsBar').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">Total Ideas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${favorited}</div>
                    <div class="stat-label">Favorites</div>
                </div>
            `;
        }

        function openModal(event, id) {
            event.stopPropagation();
            const idea = allIdeas.find(i => i.id === id);
            if (!idea) return;

            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <div class="modal-meta-row">
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Status</div>
                        <div class="modal-meta-value">${idea.status}</div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Priority</div>
                        <div class="modal-meta-value">P${idea.priority}</div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Impact</div>
                        <div class="modal-meta-value">${idea.metrics?.impact || 5}/10</div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Difficulty</div>
                        <div class="modal-meta-value">${idea.metrics?.difficulty || 'Medium'}</div>
                    </div>
                </div>
                <div class="modal-description">${escapeHtml(idea.fullDescription)}</div>
                ${idea.tags && idea.tags.length > 0 ? `
                    <div class="modal-tags-section">
                        <span class="modal-tags-label">Skills Required</span>
                        <div class="modal-tags">
                            ${idea.tags.map(tag => `<span class="modal-tag">${escapeHtml(tag)}</span>`).join('')}
                        </div>
                    </div>
                ` : ''}
            `;

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function refreshIdeas() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('loading');
            fetchIdeas().finally(() => btn.classList.remove('loading'));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on background click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Load ideas on page load
        fetchIdeas();
    </script>
</body>
</html>
