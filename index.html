<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josh's Ideas Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f1ed 0%, #e8dfd8 100%);
            color: #2a2420;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
            animation: slideDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            color: #2a2420;
        }

        .subtitle {
            color: #8b7f78;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(139, 127, 120, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease-out;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #d4a574;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #8b7f78;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 60px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(212, 165, 116, 0.3);
            color: #2a2420;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #d4a574;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.2);
        }

        input[type="text"]::placeholder {
            color: #a89680;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            color: #8b7f78;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 10px;
            font-weight: 600;
        }

        button {
            padding: 11px 16px;
            background: rgba(255, 255, 255, 0.6);
            color: #6b5f56;
            border: 1px solid rgba(139, 127, 120, 0.2);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(212, 165, 116, 0.4);
            color: #d4a574;
        }

        button.active {
            background: rgba(212, 165, 116, 0.2);
            border-color: #d4a574;
            color: #d4a574;
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.2);
        }

        .sort-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            padding: 11px 14px;
            background: rgba(255, 255, 255, 0.6);
            color: #2a2420;
            border: 1px solid rgba(139, 127, 120, 0.2);
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        select:hover {
            border-color: rgba(212, 165, 116, 0.4);
        }

        select:focus {
            outline: none;
            border-color: #d4a574;
        }

        .category-carousel {
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        .category-slide {
            animation: fadeInUp 0.8s ease-out;
        }

        .category-trigger {
            cursor: pointer;
            padding: 24px;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(212, 165, 116, 0.3);
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .category-trigger::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 165, 116, 0.1), transparent);
            transition: left 0.4s ease;
        }

        .category-trigger:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: #d4a574;
            box-shadow: 0 10px 30px rgba(212, 165, 116, 0.15);
            transform: translateX(10px);
        }

        .category-trigger:hover::before {
            left: 100%;
        }

        .category-icon-large {
            font-size: 2.5rem;
            flex-shrink: 0;
        }

        .category-info {
            flex: 1;
            position: relative;
            z-index: 2;
        }

        .category-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: #2a2420;
            margin-bottom: 6px;
        }

        .category-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: #8b7f78;
        }

        .category-chevron {
            font-size: 1.5rem;
            color: #d4a574;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .category-trigger.expanded .category-chevron {
            transform: rotate(90deg);
        }

        .ideas-stack {
            display: none;
            margin-top: 30px;
        }

        .ideas-stack.active {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 30px;
            animation: slideOut 0.5s ease-out;
        }

        @keyframes slideOut {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .idea-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(245, 241, 237, 0.8));
            border: 1px solid rgba(212, 165, 116, 0.25);
            border-radius: 12px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .idea-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 165, 116, 0.15), transparent);
            transition: left 0.4s ease;
        }

        .idea-card:hover {
            border-color: #d4a574;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(245, 241, 237, 0.95));
            box-shadow: 0 12px 40px rgba(212, 165, 116, 0.25);
            transform: translateY(-8px);
        }

        .idea-card:hover::before {
            left: 100%;
        }

        .card-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-header-top {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .card-icon {
            font-size: 2rem;
            flex-shrink: 0;
        }

        .card-title-section {
            flex: 1;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #2a2420;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .card-status {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(212, 165, 116, 0.15);
            border: 1px solid rgba(212, 165, 116, 0.3);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #8b5a2b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-description {
            font-size: 0.95rem;
            color: #6b5f56;
            line-height: 1.6;
            margin-bottom: 18px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .card-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(139, 127, 120, 0.15);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #8b7f78;
        }

        .meta-label {
            font-weight: 600;
            color: #6b5f56;
        }

        .priority-badge {
            background: rgba(212, 165, 116, 0.15);
            color: #8b5a2b;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tag {
            background: rgba(139, 127, 120, 0.1);
            color: #6b5f56;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(139, 127, 120, 0.2);
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid rgba(139, 127, 120, 0.15);
        }

        .card-expand {
            color: #d4a574;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
        }

        .favorite-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s ease;
            padding: 0;
        }

        .favorite-btn:hover {
            transform: scale(1.2);
        }

        .favorite-btn.starred {
            color: #d4a574;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(245, 241, 237, 0.98));
            border: 2px solid rgba(212, 165, 116, 0.3);
            border-radius: 16px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #8b7f78;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border-radius: 6px;
        }

        .modal-close:hover {
            color: #d4a574;
            background: rgba(212, 165, 116, 0.1);
        }

        .modal-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #2a2420;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .modal-meta-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(139, 127, 120, 0.15);
            flex-wrap: wrap;
        }

        .modal-meta-item {
            flex: 1;
            min-width: 150px;
        }

        .modal-meta-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b7f78;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .modal-meta-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2a2420;
        }

        .modal-description {
            font-size: 1.05rem;
            color: #6b5f56;
            line-height: 1.9;
            white-space: pre-wrap;
            margin-bottom: 24px;
        }

        .modal-tags-section {
            margin-bottom: 24px;
        }

        .modal-tags-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b7f78;
            font-weight: 700;
            margin-bottom: 12px;
            display: block;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .modal-tag {
            background: rgba(212, 165, 116, 0.15);
            color: #8b5a2b;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(212, 165, 116, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b7f78;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #d4a574;
            font-size: 1.1rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 15px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .ideas-stack.active {
                grid-template-columns: 1fr;
            }

            .category-trigger {
                flex-direction: column;
                align-items: flex-start;
            }

            .modal-content {
                padding: 30px;
                width: 95%;
            }

            .modal-title {
                font-size: 1.8rem;
            }

            .stat-card {
                padding: 16px;
            }

            .stat-number {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>IDEAS</h1>
            <p class="subtitle">Live from Google Sheets • Auto-updating</p>
        </header>

        <div class="stats-bar" id="statsBar"></div>

        <div class="controls">
            <div class="search-bar">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search ideas by name or description..."
                    autocomplete="off"
                />
                <div class="sort-controls">
                    <label for="sortBy" class="filter-label">Sort:</label>
                    <select id="sortBy">
                        <option value="date">Date Added</option>
                        <option value="priority">Priority</option>
                        <option value="status">Status</option>
                        <option value="name">Alphabetical</option>
                    </select>
                </div>
            </div>

            <div class="filter-buttons">
                <span class="filter-label">Priority:</span>
                <button class="filter-btn active" data-priority="all">All</button>
                <button class="filter-btn" data-priority="1">P1</button>
                <button class="filter-btn" data-priority="2">P2</button>
                <button class="filter-btn" data-priority="3">P3</button>
                <button class="filter-btn" data-priority="4">P4</button>
                <button class="filter-btn" data-priority="5">P5</button>
            </div>
        </div>

        <div id="content" class="loading">Loading ideas...</div>

        <div id="modal" class="modal">
            <div class="modal-content">
                <button class="modal-close" id="modalClose">&times;</button>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1UA_TX0lA3xwHQHY9k0gIprfkZ9W05nD2tSBEURamuqQ';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        let allIdeas = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let currentSort = 'date';
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

        const categoryIcons = {
            'AI Tools': '🤖',
            'Business': '💼',
            'Technology': '⚡',
            'Design': '🎨',
            'Marketing': '📊',
            'Other': '✨'
        };

        const toolIcons = {
            'Wisprflow': '🎙️',
            'Granola': '📝',
            'Littlebird': '🦅'
        };

        const toolTags = {
            'Wisprflow': ['Voice-to-Text', 'AI', 'Productivity'],
            'Granola': ['Meeting Notes', 'Transcription', 'Search'],
            'Littlebird': ['AI Assistant', 'Screen Reading', 'Memory']
        };

        const toolStatus = {
            'Wisprflow': 'Ideating',
            'Granola': 'Ideating',
            'Littlebird': 'Ideating'
        };

        const toolMetrics = {
            'Wisprflow': { difficulty: 'Hard', impact: 9 },
            'Granola': { difficulty: 'Hard', impact: 8 },
            'Littlebird': { difficulty: 'Very Hard', impact: 10 }
        };

        async function fetchIdeas() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();

                const match = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/);
                if (!match) throw new Error('Invalid response format');

                const jsonStr = match[1];
                const data = JSON.parse(jsonStr);

                if (data.status === 'error') {
                    console.error('Sheet API error:', data.errors);
                    throw new Error('Failed to fetch sheet data');
                }

                allIdeas = [];
                const rows = data.table.rows || [];

                rows.forEach((row, index) => {
                    if (row.c && row.c.length >= 5) {
                        const name = row.c[1]?.v || '';
                        const idea = {
                            id: index,
                            category: row.c[0]?.v || 'Other',
                            name: name,
                            description: row.c[2]?.v || '',
                            priority: parseInt(row.c[3]?.v) || 0,
                            fullDescription: row.c[4]?.v || '',
                            status: toolStatus[name] || 'Ideating',
                            tags: toolTags[name] || ['Idea'],
                            metrics: toolMetrics[name] || { difficulty: 'Medium', impact: 5 }
                        };
                        if (idea.name) allIdeas.push(idea);
                    }
                });

                renderIdeas();
                return true;
            } catch (error) {
                console.error('Error fetching ideas:', error);
                showError('Failed to load ideas. Make sure the Google Sheet is publicly shared.');
                return false;
            }
        }

        function filterIdeas() {
            return allIdeas.filter(idea => {
                const matchPriority = currentFilter === 'all' || idea.priority.toString() === currentFilter;
                const matchSearch = !currentSearch ||
                    idea.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    idea.description.toLowerCase().includes(currentSearch.toLowerCase());
                return matchPriority && matchSearch;
            });
        }

        function sortIdeas(ideas) {
            const sorted = [...ideas];
            switch(currentSort) {
                case 'priority':
                    return sorted.sort((a, b) => a.priority - b.priority);
                case 'status':
                    const statusOrder = { 'Shipped': 0, 'Building': 1, 'Ideating': 2 };
                    return sorted.sort((a, b) => (statusOrder[a.status] || 2) - (statusOrder[b.status] || 2));
                case 'name':
                    return sorted.sort((a, b) => a.name.localeCompare(b.name));
                case 'date':
                default:
                    return sorted;
            }
        }

        function groupByCategory(ideas) {
            const grouped = {};
            ideas.forEach(idea => {
                if (!grouped[idea.category]) {
                    grouped[idea.category] = [];
                }
                grouped[idea.category].push(idea);
            });
            return grouped;
        }

        function renderStats() {
            const total = allIdeas.length;
            const byStatus = {};

            allIdeas.forEach(idea => {
                byStatus[idea.status] = (byStatus[idea.status] || 0) + 1;
            });

            const statHtml = `
                <div class="stat-card">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">Total Ideas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${byStatus['Shipped'] || 0}</div>
                    <div class="stat-label">Shipped</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${byStatus['Building'] || 0}</div>
                    <div class="stat-label">Building</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${byStatus['Ideating'] || 0}</div>
                    <div class="stat-label">Ideating</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${favorites.length}</div>
                    <div class="stat-label">Favorites</div>
                </div>
            `;

            document.getElementById('statsBar').innerHTML = statHtml;
        }

        function renderIdeas() {
            const filtered = filterIdeas();
            const sorted = sortIdeas(filtered);
            const content = document.getElementById('content');

            if (sorted.length === 0) {
                content.innerHTML = '<div class="empty-state"><p>No ideas match your filters.</p></div>';
                return;
            }

            const grouped = groupByCategory(sorted);
            const categories = Object.keys(grouped).sort();

            const html = categories.map(category => {
                const ideas = grouped[category];
                const icon = categoryIcons[category] || '✨';
                const totalInCategory = allIdeas.filter(i => i.category === category).length;

                return `
                    <div class="category-slide">
                        <div class="category-trigger" onclick="toggleCategory(this)">
                            <div class="category-icon-large">${icon}</div>
                            <div class="category-info">
                                <div class="category-name">${escapeHtml(category)}</div>
                                <div class="category-meta">
                                    <span>${ideas.length} of ${totalInCategory} ideas</span>
                                </div>
                            </div>
                            <div class="category-chevron">›</div>
                        </div>
                        <div class="ideas-stack" data-category="${escapeHtml(category)}">
                            ${ideas.map(idea => `
                                <div class="idea-card" onclick="openModal(event, ${idea.id})">
                                    <div class="card-content">
                                        <div class="card-header-top">
                                            <div class="card-icon">${toolIcons[idea.name] || '💡'}</div>
                                            <div class="card-title-section" style="flex: 1;">
                                                <h3 class="card-title">${escapeHtml(idea.name)}</h3>
                                                <span class="card-status">${idea.status}</span>
                                            </div>
                                        </div>
                                        <p class="card-description">${escapeHtml(idea.description)}</p>
                                        ${idea.tags && idea.tags.length > 0 ? `
                                            <div class="card-tags">
                                                ${idea.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
                                            </div>
                                        ` : ''}
                                        <div class="card-meta">
                                            <div class="meta-item">
                                                <span class="meta-label">Priority:</span>
                                                <span class="priority-badge">P${idea.priority}</span>
                                            </div>
                                            <div class="meta-item">
                                                <span class="meta-label">Impact:</span>
                                                <span>${idea.metrics?.impact || 5}/10</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="card-footer">
                                        <span class="card-expand">View details →</span>
                                        <button class="favorite-btn ${isFavorited(idea.id) ? 'starred' : ''}" onclick="toggleFavorite(event, ${idea.id}, '${escapeHtml(idea.name)}')">
                                            ${isFavorited(idea.id) ? '★' : '☆'}
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');

            content.innerHTML = `<div class="category-carousel">${html}</div>`;
            renderStats();
        }

        function toggleCategory(trigger) {
            trigger.classList.toggle('expanded');
            const stack = trigger.nextElementSibling;
            stack.classList.toggle('active');
        }

        function isFavorited(id) {
            return favorites.includes(id);
        }

        function toggleFavorite(event, id, name) {
            event.stopPropagation();
            if (favorites.includes(id)) {
                favorites = favorites.filter(f => f !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            renderIdeas();
        }

        function openModal(event, id) {
            event.stopPropagation();
            const idea = allIdeas.find(i => i.id === id);
            if (!idea) return;

            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <div style="display: flex; align-items: baseline; gap: 16px; margin-bottom: 20px;">
                    <div class="modal-icon">${toolIcons[idea.name] || '💡'}</div>
                    <div>
                        <h2 class="modal-title">${escapeHtml(idea.name)}</h2>
                    </div>
                </div>
                <div class="modal-meta-row">
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Status</div>
                        <div class="modal-meta-value">${idea.status}</div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Priority</div>
                        <div class="modal-meta-value">P${idea.priority}</div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Impact</div>
                        <div class="modal-meta-value">${idea.metrics?.impact || 5}/10</div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Difficulty</div>
                        <div class="modal-meta-value">${idea.metrics?.difficulty || 'Medium'}</div>
                    </div>
                </div>
                <div class="modal-description">${escapeHtml(idea.fullDescription)}</div>
                ${idea.tags && idea.tags.length > 0 ? `
                    <div class="modal-tags-section">
                        <span class="modal-tags-label">Skills Required</span>
                        <div class="modal-tags">
                            ${idea.tags.map(tag => `<span class="modal-tag">${escapeHtml(tag)}</span>`).join('')}
                        </div>
                    </div>
                ` : ''}
            `;

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text ? text.replace(/[&<>"']/g, m => map[m]) : '';
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `<div class="empty-state"><p>${message}</p></div>`;
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderIdeas();
        });

        document.getElementById('sortBy').addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderIdeas();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.priority;
                renderIdeas();
            });
        });

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Initial fetch and auto-refresh
        fetchIdeas();
        setInterval(fetchIdeas, 30000);
    </script>
</body>
</html>
