<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josh's Ideas Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f15 0%, #1a1625 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            color: #f0f0f0;
        }

        .subtitle {
            color: #a0a0a8;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .header-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .refresh-btn {
            padding: 10px 18px;
            background: rgba(100, 150, 255, 0.15);
            color: #6496ff;
            border: 1px solid rgba(100, 150, 255, 0.4);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: rgba(100, 150, 255, 0.25);
            border-color: rgba(100, 150, 255, 0.6);
        }

        .refresh-btn.loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 60px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease-out;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6496ff 0%, #64d5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #a0a0a8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 60px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: rgba(100, 150, 255, 0.5);
            background: rgba(100, 150, 255, 0.08);
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.2);
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            color: #a0a0a8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 10px;
            font-weight: 600;
        }

        button {
            padding: 11px 16px;
            background: rgba(255, 255, 255, 0.06);
            color: #c0c0c8;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #e0e0e0;
        }

        button.active {
            background: rgba(100, 150, 255, 0.2);
            border-color: rgba(100, 150, 255, 0.5);
            color: #6496ff;
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.2);
        }

        .sort-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            padding: 11px 14px;
            background: rgba(255, 255, 255, 0.06);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        select:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        select:focus {
            outline: none;
            border-color: rgba(100, 150, 255, 0.5);
        }

        .carousel-section {
            margin-bottom: 120px;
        }

        .carousel-section-header {
            margin-bottom: 60px;
            text-align: center;
        }

        .carousel-section-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #f0f0f0;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .carousel-section-count {
            color: #a0a0a8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 3D Carousel */
        .carousel-3d {
            perspective: 2500px;
            height: 420px;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 80px;
            cursor: grab;
            overflow: visible;
        }

        .carousel-3d:active {
            cursor: grabbing;
        }

        .carousel-3d-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .idea-card-carousel {
            position: absolute;
            width: 520px;
            height: 300px;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            margin: auto;
            transform-style: preserve-3d;
            transform-origin: center center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            cursor: pointer;
        }

        .idea-card-carousel.active {
            opacity: 1 !important;
        }

        .idea-card-carousel.hovering {
            opacity: 1 !important;
            z-index: 300 !important;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7) !important;
        }

        .idea-card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 30px;
            background: linear-gradient(180deg, #6496ff 0%, rgba(100, 150, 255, 0.1) 100%);
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .idea-card-carousel.active .idea-card-face:hover,
        .idea-card-carousel.next .idea-card-face:hover,
        .idea-card-carousel.prev .idea-card-face:hover,
        .idea-card-face:hover {
            opacity: 1 !important;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7) !important;
        }

        .idea-card-carousel.granola .idea-card-face {
            background: linear-gradient(180deg, #4ade80 0%, rgba(74, 222, 128, 0.1) 100%);
            border-color: rgba(74, 222, 128, 0.3);
        }

        .idea-card-carousel.littlebird .idea-card-face {
            background: linear-gradient(180deg, #c084fc 0%, rgba(192, 132, 252, 0.1) 100%);
            border-color: rgba(192, 132, 252, 0.3);
        }

        .card-header {
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .card-status {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-description {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.4;
            margin-bottom: 12px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .card-tag {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.9);
            padding: 3px 7px;
            border-radius: 5px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .card-meta {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 8px;
        }

        .card-expand-hint {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            font-style: italic;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a8;
            font-size: 1.1rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 800;
            color: #f0f0f0;
        }

        .modal-close {
            background: none;
            border: none;
            color: #a0a0a8;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            color: #f0f0f0;
            transform: rotate(90deg);
        }

        .modal-meta-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-meta-item {
            display: flex;
            flex-direction: column;
        }

        .modal-meta-label {
            font-size: 0.75rem;
            color: #a0a0a8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .modal-meta-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #6496ff;
        }

        .modal-description {
            font-size: 1rem;
            color: #c0c0c8;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .modal-tags-section {
            margin-top: 30px;
        }

        .modal-tags-label {
            display: block;
            font-size: 0.85rem;
            color: #a0a0a8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .modal-tag {
            background: rgba(100, 150, 255, 0.15);
            color: #6496ff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(100, 150, 255, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 150, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Josh's Ideas</h1>
            <p class="subtitle">3D Carousel of Innovation</p>
            <div class="header-controls">
                <button class="refresh-btn" onclick="refreshIdeas()">🔄 Refresh</button>
            </div>
        </header>

        <div class="stats-bar" id="statsBar"></div>

        <div class="controls">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search ideas..." onkeyup="renderIdeas()">
            </div>
            <div class="filter-buttons">
                <span class="filter-label">Priority:</span>
                <button onclick="toggleFilter('priority', 'P1')" data-filter="priority-P1">P1</button>
                <button onclick="toggleFilter('priority', 'P2')" data-filter="priority-P2">P2</button>
                <button onclick="toggleFilter('priority', 'P3')" data-filter="priority-P3">P3</button>
                <button onclick="toggleFilter('priority', 'P4')" data-filter="priority-P4">P4</button>
                <button onclick="toggleFilter('priority', 'P5')" data-filter="priority-P5">P5</button>
            </div>
            <div class="sort-controls">
                <span class="filter-label">Sort by:</span>
                <select id="sortBy" onchange="renderIdeas()">
                    <option value="name">Name (A-Z)</option>
                    <option value="priority">Priority</option>
                    <option value="impact">Impact (High)</option>
                </select>
            </div>
        </div>

        <div id="content"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 class="modal-title" id="modalTitle"></h2>
                </div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1UA_TX0lA3xwHQHY9k0gIprfkZ9W05nD2tSBEURamuqQ';
        const QUERY_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=0&tq=SELECT A,B,C,D,E`;

        let allIdeas = [];
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        const activeFilters = new Map();
        let carouselIndices = {}; // Track current index per category

        const toolInfo = {
            'Wisprflow': { brand: 'wisprflow', status: 'IDEATING', tags: ['Voice-to-text', 'AI', 'Productivity'], metrics: { impact: 9, difficulty: 'Medium' } },
            'Granola': { brand: 'granola', status: 'IDEATING', tags: ['Meeting Notes', 'Transcription', 'Search'], metrics: { impact: 8, difficulty: 'Medium' } },
            'Littlebird': { brand: 'littlebird', status: 'IDEATING', tags: ['AI Assistant', 'Screen Reading', 'Memory'], metrics: { impact: 10, difficulty: 'Hard' } },
            'Cursor': { brand: 'default', status: 'LIVE', tags: ['Code Editor', 'AI', 'Development'], metrics: { impact: 9, difficulty: 'Hard' } },
            'Perplexity': { brand: 'default', status: 'LIVE', tags: ['Search', 'AI', 'Research'], metrics: { impact: 8, difficulty: 'Medium' } },
            'Midjourney': { brand: 'default', status: 'LIVE', tags: ['Image Gen', 'AI', 'Design'], metrics: { impact: 9, difficulty: 'Hard' } },
            'Replit': { brand: 'default', status: 'LIVE', tags: ['IDE', 'Code', 'Collaboration'], metrics: { impact: 7, difficulty: 'Medium' } },
            'Claude': { brand: 'default', status: 'LIVE', tags: ['AI Assistant', 'Chat', 'Reasoning'], metrics: { impact: 10, difficulty: 'Hard' } },
            'Figma': { brand: 'default', status: 'LIVE', tags: ['Design', 'Collaboration', 'UI/UX'], metrics: { impact: 8, difficulty: 'Hard' } }
        };

        async function fetchIdeas() {
            try {
                const response = await fetch(QUERY_URL);
                const text = await response.text();
                const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);

                if (!jsonMatch) throw new Error('Invalid response format');

                const data = JSON.parse(jsonMatch[1]);
                if (data.status !== 'ok') throw new Error(data.message || 'Query failed');

                allIdeas = (data.table.rows || []).map((row, idx) => {
                    const category = row.c[0]?.v || 'Other';
                    const name = row.c[1]?.v || '';
                    const description = row.c[2]?.v || '';
                    const priority = parseInt(row.c[3]?.v || '3');
                    const fullDescription = row.c[4]?.v || description;
                    const info = toolInfo[name] || { brand: 'default', status: 'IDEATING', tags: [], metrics: { impact: 5, difficulty: 'Medium' } };

                    return { id: idx, category, name, description, fullDescription, priority, ...info };
                });

                // Add 6 more mock ideas
                const mockIdeas = [
                    { id: allIdeas.length, category: 'Dev Tools', name: 'Cursor', description: 'AI-powered code editor with inline suggestions and context awareness', priority: 2, fullDescription: 'Advanced code editor that uses Claude to understand your codebase and provide intelligent suggestions inline as you type. Supports multi-file edits, debugging, and testing with AI assistance.', ...toolInfo['Cursor'] },
                    { id: allIdeas.length + 1, category: 'Search & Research', name: 'Perplexity', description: 'AI search engine with real-time web access and source citations', priority: 2, fullDescription: 'Next-generation search that uses AI to understand complex questions and provide detailed answers with proper source attribution. Perfect for research, learning, and staying informed.', ...toolInfo['Perplexity'] },
                    { id: allIdeas.length + 2, category: 'Creative', name: 'Midjourney', description: 'Text-to-image AI generation with artistic style control', priority: 3, fullDescription: 'Create stunning images from text descriptions. Features advanced style parameters, upscaling, and community features. Used by designers and artists worldwide for rapid concept generation.', ...toolInfo['Midjourney'] },
                    { id: allIdeas.length + 3, category: 'Dev Tools', name: 'Replit', description: 'Cloud IDE with built-in AI code completion and collaboration features', priority: 3, fullDescription: 'Full-featured IDE in the browser with support for 50+ languages, AI copilot assistance, and real-time collaboration. Perfect for learning, teaching, and rapid prototyping.', ...toolInfo['Replit'] },
                    { id: allIdeas.length + 4, category: 'AI Assistants', name: 'Claude', description: 'Advanced AI assistant with reasoning and code capabilities', priority: 1, fullDescription: 'General-purpose AI assistant by Anthropic with strong reasoning abilities, code generation, analysis, and creative writing. Available via API, web, and desktop applications.', ...toolInfo['Claude'] },
                    { id: allIdeas.length + 5, category: 'Design', name: 'Figma', description: 'Collaborative design tool with AI-powered features for prototyping', priority: 2, fullDescription: 'Cloud-based design platform enabling real-time collaboration on UI/UX design projects. Recent AI features help with layout generation, design suggestions, and user testing synthesis.', ...toolInfo['Figma'] }
                ];
                allIdeas = [...allIdeas, ...mockIdeas];

                renderIdeas();
            } catch (error) {
                console.error('Error fetching ideas:', error);
                document.getElementById('content').innerHTML = '<div class="empty-state"><p>Error loading ideas. Please refresh.</p></div>';
            }
        }

        function toggleFilter(type, value) {
            const key = `${type}-${value}`;
            const btn = document.querySelector(`[data-filter="${key}"]`);
            if (activeFilters.has(key)) {
                activeFilters.delete(key);
                btn.classList.remove('active');
            } else {
                activeFilters.set(key, true);
                btn.classList.add('active');
            }
            renderIdeas();
        }

        function filterIdeas() {
            return allIdeas.filter(idea => {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const matchesSearch = idea.name.toLowerCase().includes(searchTerm) || idea.description.toLowerCase().includes(searchTerm);
                const priorityFilters = Array.from(activeFilters.keys()).filter(k => k.startsWith('priority-'));
                const matchesPriority = priorityFilters.length === 0 || priorityFilters.some(f => f === `priority-P${idea.priority}`);
                return matchesSearch && matchesPriority;
            });
        }

        function sortIdeas(ideas) {
            const sortBy = document.getElementById('sortBy').value;
            const sorted = [...ideas];
            switch(sortBy) {
                case 'priority':
                    sorted.sort((a, b) => a.priority - b.priority);
                    break;
                case 'impact':
                    sorted.sort((a, b) => (b.metrics?.impact || 5) - (a.metrics?.impact || 5));
                    break;
                case 'name':
                default:
                    sorted.sort((a, b) => a.name.localeCompare(b.name));
            }
            return sorted;
        }

        function groupByCategory(ideas) {
            return ideas.reduce((acc, idea) => {
                if (!acc[idea.category]) acc[idea.category] = [];
                acc[idea.category].push(idea);
                return acc;
            }, {});
        }

        function renderIdeas() {
            const filtered = filterIdeas();
            const sorted = sortIdeas(filtered);
            const content = document.getElementById('content');

            if (sorted.length === 0) {
                content.innerHTML = '<div class="empty-state"><p>No ideas match your filters.</p></div>';
                renderStats();
                return;
            }

            const grouped = groupByCategory(sorted);
            const categories = Object.keys(grouped).sort();

            const html = categories.map(category => {
                const ideas = grouped[category];
                const cardsHtml = ideas.map((idea, idx) => {
                    const isActive = idx === 0;
                    const isPrev = idx === ideas.length - 1;

                    return `
                        <div class="idea-card-carousel ${idea.brand} ${isActive ? 'active' : isPrev ? 'prev' : 'next'}" onclick="openModal(event, ${idea.id})">
                            <div class="idea-card-face">
                                <div class="card-header">
                                    <div class="card-name">${escapeHtml(idea.name)}</div>
                                    <span class="card-status">${idea.status}</span>
                                </div>
                                <p class="card-description">${escapeHtml(idea.description)}</p>
                                ${idea.tags && idea.tags.length > 0 ? `
                                    <div class="card-tags">
                                        ${idea.tags.slice(0, 3).map(tag => `<span class="card-tag">${escapeHtml(tag)}</span>`).join('')}
                                    </div>
                                ` : ''}
                                <div class="card-meta">
                                    <div><strong>P${idea.priority}</strong></div>
                                    <div>Impact: <strong>${idea.metrics?.impact || 5}/10</strong></div>
                                </div>
                                <div class="card-expand-hint">Hover to reveal • Click to expand</div>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="carousel-section">
                        <div class="carousel-section-header">
                            <div class="carousel-section-title">${escapeHtml(category)}</div>
                            <div class="carousel-section-count">${ideas.length} ideas</div>
                        </div>
                        <div class="carousel-3d">
                            <div class="carousel-3d-inner" style="transform-style: preserve-3d;">
                                ${cardsHtml}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            content.innerHTML = html;

            // Add scroll listeners to all carousels
            document.querySelectorAll('.carousel-3d').forEach((carousel, idx) => {
                const categoryKey = categories[idx];
                if (!carouselIndices[categoryKey]) {
                    carouselIndices[categoryKey] = 0;
                }

                carousel.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const ideas = grouped[categoryKey];
                    const currentIdx = carouselIndices[categoryKey];

                    // Scroll down/right = next card, scroll up/left = prev card
                    if (e.deltaY > 0 || e.deltaX > 0) {
                        carouselIndices[categoryKey] = (currentIdx + 1) % ideas.length;
                    } else {
                        carouselIndices[categoryKey] = (currentIdx - 1 + ideas.length) % ideas.length;
                    }

                    updateCarousel(carousel, ideas, carouselIndices[categoryKey]);
                });

                // Add hover listeners to card faces
                carousel.querySelectorAll('.idea-card-face').forEach(face => {
                    const card = face.closest('.idea-card-carousel');
                    face.addEventListener('mouseenter', () => {
                        card.classList.add('hovering');
                    });
                    face.addEventListener('mouseleave', () => {
                        card.classList.remove('hovering');
                    });

                    // Add wheel listener to card so scrolling works when hovering
                    face.addEventListener('wheel', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        const ideas = grouped[categoryKey];
                        const currentIdx = carouselIndices[categoryKey];

                        if (e.deltaY > 0 || e.deltaX > 0) {
                            carouselIndices[categoryKey] = (currentIdx + 1) % ideas.length;
                        } else {
                            carouselIndices[categoryKey] = (currentIdx - 1 + ideas.length) % ideas.length;
                        }

                        updateCarousel(carousel, ideas, carouselIndices[categoryKey]);
                    });
                });
            });

            renderStats();
        }

        function updateCarousel(carousel, ideas, activeIdx) {
            const cards = carousel.querySelectorAll('.idea-card-carousel');
            const totalCards = ideas.length;

            cards.forEach((card, idx) => {
                // Calculate offset from active card
                const offset = (idx - activeIdx + totalCards) % totalCards;

                // Determine position: left (incoming), center (active), or right (outgoing)
                let translateX = 0;
                let rotationAngle = 0;
                let zIndex = 0;

                if (offset === 0) {
                    // Active card in center, facing forward
                    translateX = 0;
                    rotationAngle = 0;
                    zIndex = totalCards;
                } else if (offset < totalCards / 2) {
                    // Next cards coming from left at 45 degrees
                    translateX = -520;
                    rotationAngle = 45;
                    zIndex = totalCards - offset;
                } else {
                    // Previous cards exiting to right at -45 degrees
                    translateX = 520;
                    rotationAngle = -45;
                    zIndex = totalCards - offset;
                }

                // Depth spacing so stacked cards are visible
                const depth = -offset * 60;

                // Opacity fades cards on the sides
                const opacity = offset === 0 ? 1 : 0.6;

                // Apply transforms
                card.style.transform = `translateX(${translateX}px) rotateY(${rotationAngle}deg) translateZ(${depth}px)`;
                card.style.opacity = opacity;
                card.style.zIndex = zIndex;

                // Mark active card
                card.classList.remove('active');
                if (offset === 0) {
                    card.classList.add('active');
                }
            });
        }

        function renderStats() {
            const total = allIdeas.length;
            const favorited = allIdeas.filter(i => favorites.includes(i.id)).length;
            const shipped = allIdeas.filter(i => i.status === 'SHIPPED').length;
            const building = allIdeas.filter(i => i.status === 'BUILDING').length;
            const ideating = allIdeas.filter(i => i.status === 'IDEATING').length;

            document.getElementById('statsBar').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">Total Ideas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${favorited}</div>
                    <div class="stat-label">Favorites</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${shipped}</div>
                    <div class="stat-label">Shipped</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${building}</div>
                    <div class="stat-label">Building</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${ideating}</div>
                    <div class="stat-label">Ideating</div>
                </div>
            `;
        }

        function openModal(event, id) {
            event.stopPropagation();
            const idea = allIdeas.find(i => i.id === id);
            if (!idea) return;

            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <div class="modal-meta-row">
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Status</div>
                        <div class="modal-meta-value">${idea.status}</div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Priority</div>
                        <div class="modal-meta-value">P${idea.priority}</div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Impact</div>
                        <div class="modal-meta-value">${idea.metrics?.impact || 5}/10</div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Difficulty</div>
                        <div class="modal-meta-value">${idea.metrics?.difficulty || 'Medium'}</div>
                    </div>
                </div>
                <div class="modal-description">${escapeHtml(idea.fullDescription)}</div>
                ${idea.tags && idea.tags.length > 0 ? `
                    <div class="modal-tags-section">
                        <span class="modal-tags-label">Skills Required</span>
                        <div class="modal-tags">
                            ${idea.tags.map(tag => `<span class="modal-tag">${escapeHtml(tag)}</span>`).join('')}
                        </div>
                    </div>
                ` : ''}
            `;

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function refreshIdeas() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('loading');
            fetchIdeas().finally(() => btn.classList.remove('loading'));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        fetchIdeas();
    </script>
</body>
</html>
