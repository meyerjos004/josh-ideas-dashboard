<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josh's Ideas Dashboard</title>
    <!-- ANIME.JS - Add this one line and you're good to go -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f15 0%, #1a1625 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            margin-left: 200px;
            padding: 60px 20px;
            transition: margin-left 0.3s ease;
        }

        .container.sidebar-collapsed {
            margin-left: 60px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
            max-width: 900px;
            margin: 0 auto 40px auto;
            transform: translateX(calc(-100px));
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            color: #f0f0f0;
        }

        .subtitle {
            color: #a0a0a8;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .header-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .refresh-btn {
            padding: 10px 18px;
            background: rgba(100, 150, 255, 0.15);
            color: #6496ff;
            border: 1px solid rgba(100, 150, 255, 0.4);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: rgba(100, 150, 255, 0.25);
            border-color: rgba(100, 150, 255, 0.6);
        }

        .refresh-btn.loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 0 auto 60px auto;
            max-width: 900px;
            transform: translateX(calc(-100px));
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease-out;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6496ff 0%, #64d5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #a0a0a8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 0 auto 60px auto;
            max-width: 900px;
            transform: translateX(calc(-100px));
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        .add-btn {
            padding: 14px 18px;
            background: rgba(76, 222, 128, 0.15);
            color: #4cde80;
            border: 1px solid rgba(76, 222, 128, 0.4);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .add-btn:hover {
            background: rgba(76, 222, 128, 0.25);
            border-color: rgba(76, 222, 128, 0.6);
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: rgba(100, 150, 255, 0.5);
            background: rgba(100, 150, 255, 0.08);
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.2);
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            color: #a0a0a8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 10px;
            font-weight: 600;
        }

        button {
            padding: 11px 16px;
            background: rgba(255, 255, 255, 0.06);
            color: #c0c0c8;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #e0e0e0;
        }

        button.active {
            background: rgba(100, 150, 255, 0.2);
            border-color: rgba(100, 150, 255, 0.5);
            color: #6496ff;
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.2);
        }

        .sort-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            padding: 11px 14px;
            background: rgba(255, 255, 255, 0.06);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        select:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        select:focus {
            outline: none;
            border-color: rgba(100, 150, 255, 0.5);
        }

        .carousel-section {
            margin-bottom: 120px;
        }

        .carousel-section-header {
            margin-bottom: 60px;
            text-align: center;
        }

        .carousel-section-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #f0f0f0;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .carousel-section-count {
            color: #a0a0a8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 3D Carousel */
        .carousel-3d {
            perspective: 2500px;
            height: 420px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 80px auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            overflow: visible;
        }

        .carousel-3d:active {
            cursor: grabbing;
        }

        .carousel-3d-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .idea-card-carousel {
            position: absolute;
            width: 520px;
            height: 300px;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            margin: auto;
            transform-style: preserve-3d;
            transform-origin: center center;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.33, 0.66, 0.66, 1), opacity 0.5s cubic-bezier(0.33, 0.66, 0.66, 1);
        }

        .idea-card-carousel.active {
            opacity: 1;
        }

        .idea-card-carousel.hovering {
            opacity: 1 !important;
            z-index: 300 !important;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7) !important;
        }

        .idea-card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(30px);
            padding: 30px;
            background: linear-gradient(135deg,
                rgba(100, 150, 255, 0.15) 0%,
                rgba(100, 150, 255, 0.05) 50%,
                rgba(100, 150, 255, 0.08) 100%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.4),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2),
                0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .idea-card-carousel.active .idea-card-face:hover,
        .idea-card-carousel.next .idea-card-face:hover,
        .idea-card-carousel.prev .idea-card-face:hover,
        .idea-card-face:hover {
            opacity: 1 !important;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7) !important;
        }

        .idea-card-carousel.granola .idea-card-face {
            background: linear-gradient(180deg, #4ade80 0%, rgba(74, 222, 128, 0.1) 100%);
            border-color: rgba(74, 222, 128, 0.3);
        }

        .idea-card-carousel.littlebird .idea-card-face {
            background: linear-gradient(180deg, #c084fc 0%, rgba(192, 132, 252, 0.1) 100%);
            border-color: rgba(192, 132, 252, 0.3);
        }

        .card-header {
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-top-buttons {
            display: flex;
            gap: 6px;
        }

        .card-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .card-status {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-description {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.4;
            margin-bottom: 12px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .card-tag {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.9);
            padding: 3px 7px;
            border-radius: 5px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .card-meta {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 8px;
        }


        .card-expand-hint {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            font-style: italic;
            margin-top: auto;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .delete-btn {
            padding: 6px 8px !important;
            background: rgba(255, 100, 100, 0.15) !important;
            border: 1px solid rgba(255, 100, 100, 0.3) !important;
            color: #ff6464 !important;
        }

        .delete-btn:hover {
            background: rgba(255, 100, 100, 0.25) !important;
            border-color: rgba(255, 100, 100, 0.5) !important;
        }

        /* Light background - use dark text */
        .idea-card-face.light-bg {
            color: #1a1a1a !important;
        }

        .idea-card-face.light-bg .card-name,
        .idea-card-face.light-bg .card-description,
        .idea-card-face.light-bg .card-meta,
        .idea-card-face.light-bg .card-expand-hint {
            color: #1a1a1a !important;
        }

        .idea-card-face.light-bg .card-btn {
            background: rgba(26, 26, 26, 0.15) !important;
            border: 1px solid rgba(26, 26, 26, 0.3) !important;
            color: #1a1a1a !important;
        }

        .idea-card-face.light-bg .card-btn:hover {
            background: rgba(26, 26, 26, 0.25) !important;
            border-color: rgba(26, 26, 26, 0.5) !important;
        }

        .idea-card-face.light-bg .card-header {
            border-bottom-color: rgba(26, 26, 26, 0.2) !important;
        }

        .idea-card-face.light-bg .card-footer {
            border-top-color: rgba(26, 26, 26, 0.1) !important;
        }

        /* Dark background - use white text (default) */
        .idea-card-face.dark-bg {
            color: #e0e0e0;
        }

        .card-buttons {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .card-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 6px;
            padding: 8px 12px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .card-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }

        .card-btn:active {
            transform: scale(0.98);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a8;
            font-size: 1.1rem;
        }

        .add-card-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e0e0e0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e0e0e0;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(100, 150, 255, 0.5);
            background: rgba(100, 150, 255, 0.08);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .form-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .save-btn {
            background: rgba(100, 150, 255, 0.2);
            color: #6496ff;
            border: 1px solid rgba(100, 150, 255, 0.5);
        }

        .save-btn:hover {
            background: rgba(100, 150, 255, 0.3);
        }

        .cancel-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #a0a0a8;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 800;
            color: #f0f0f0;
        }

        .modal-close {
            background: none;
            border: none;
            color: #a0a0a8;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            color: #f0f0f0;
            transform: rotate(90deg);
        }

        .modal-meta-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-meta-item {
            display: flex;
            flex-direction: column;
        }

        .modal-meta-label {
            font-size: 0.75rem;
            color: #a0a0a8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .modal-meta-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #6496ff;
        }

        .modal-description {
            font-size: 1rem;
            color: #c0c0c8;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .modal-tags-section {
            margin-top: 30px;
        }

        .modal-tags-label {
            display: block;
            font-size: 0.85rem;
            color: #a0a0a8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .modal-tag {
            background: rgba(100, 150, 255, 0.15);
            color: #6496ff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(100, 150, 255, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 150, 255, 0.5);
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 200px;
            height: 100vh;
            background: rgba(20, 20, 30, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: width 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .sidebar.collapsed {
            width: 60px;
        }

        .sidebar-collapse-btn {
            background: transparent;
            border: none;
            color: #a0a0a8;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 12px 20px;
            transition: all 0.2s ease;
            align-self: flex-start;
        }

        .sidebar.collapsed .sidebar-collapse-btn {
            padding: 12px 14px;
        }

        .sidebar-collapse-btn:hover {
            color: #6496ff;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0;
            flex: 1;
        }

        .sidebar.collapsed .sidebar-nav {
            display: none;
        }

        .sidebar-btn {
            width: 100%;
            padding: 16px 20px;
            background: transparent;
            border: none;
            color: #a0a0a8;
            text-align: left;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
        }

        .sidebar-btn.active {
            background: rgba(100, 150, 255, 0.15);
            color: #6496ff;
            border-left-color: #6496ff;
        }

        #deletedView {
            display: none;
        }

        .deleted-card-item {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .deleted-card-info {
            flex: 1;
        }

        .deleted-card-actions {
            display: flex;
            gap: 8px;
        }

        .deleted-card-name {
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 4px;
        }

        .deleted-card-category {
            font-size: 0.85rem;
            color: #a0a0a8;
        }

        .recover-btn {
            padding: 8px 12px;
            background: rgba(76, 222, 128, 0.2);
            color: #4cde80;
            border: 1px solid rgba(76, 222, 128, 0.4);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-right: 8px;
        }

        .recover-btn:hover {
            background: rgba(76, 222, 128, 0.3);
            border-color: rgba(76, 222, 128, 0.6);
        }

        .permanent-delete-btn {
            padding: 8px 12px;
            background: rgba(255, 100, 100, 0.2);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.4);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .permanent-delete-btn:hover {
            background: rgba(255, 100, 100, 0.3);
            border-color: rgba(255, 100, 100, 0.6);
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar">☰</button>
        <div class="sidebar-nav">
            <button class="sidebar-btn active" id="homeBtn" onclick="showView('home')">Home</button>
            <button class="sidebar-btn" id="deletedBtn" onclick="showView('deleted')">Deleted</button>
        </div>
    </div>

    <div class="container">
        <div id="homeView">
        <header>
            <h1>Josh's Ideas</h1>
            <p class="subtitle">3D Carousel of Innovation</p>
            <div class="header-controls">
                <button class="refresh-btn" onclick="refreshIdeas()">Refresh</button>
            </div>
        </header>

        <div class="stats-bar" id="statsBar"></div>

        <div class="controls">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search ideas..." onkeyup="renderIdeas()">
                <button class="add-btn" onclick="openAddCardModal()">+ Add Card</button>
                <button class="add-btn" onclick="openAddCategoryModal()">+ Add Category</button>
            </div>
            <div class="filter-buttons">
                <span class="filter-label">Priority:</span>
                <button onclick="toggleFilter('priority', 'P1')" data-filter="priority-P1">P1</button>
                <button onclick="toggleFilter('priority', 'P2')" data-filter="priority-P2">P2</button>
                <button onclick="toggleFilter('priority', 'P3')" data-filter="priority-P3">P3</button>
                <button onclick="toggleFilter('priority', 'P4')" data-filter="priority-P4">P4</button>
                <button onclick="toggleFilter('priority', 'P5')" data-filter="priority-P5">P5</button>
            </div>
            <div class="filter-buttons">
                <span class="filter-label">Status:</span>
                <button onclick="toggleFilter('status', 'IDEATING')" data-filter="status-IDEATING">Ideating</button>
                <button onclick="toggleFilter('status', 'BUILDING')" data-filter="status-BUILDING">Building</button>
                <button onclick="toggleFilter('status', 'SHIPPED')" data-filter="status-SHIPPED">Shipped</button>
            </div>
            <div class="filter-buttons">
                <span class="filter-label">View:</span>
                <button onclick="toggleFilter('view', 'favorites')" data-filter="view-favorites">Favorites</button>
            </div>
            <div class="sort-controls">
                <span class="filter-label">Sort by:</span>
                <select id="sortBy" onchange="renderIdeas()">
                    <option value="name">Name (A-Z)</option>
                </select>
            </div>
        </div>

        <div id="content"></div>
        </div>

        <div id="deletedView">
            <header>
                <h1>Deleted Ideas</h1>
                <p class="subtitle">Recover or Permanently Delete</p>
            </header>
            <div id="deletedContent"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 class="modal-title" id="modalTitle"></h2>
                </div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="addCardModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Create New Card</h2>
                <button class="modal-close" onclick="closeAddCardModal()">×</button>
            </div>
            <form onsubmit="saveNewCard(event)" class="add-card-form">
                <div class="form-group">
                    <label for="cardCategory">Category</label>
                    <select id="cardCategory" required>
                        <option value="">Select or create category</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cardName">Name</label>
                    <input type="text" id="cardName" required placeholder="Card name">
                </div>
                <div class="form-group">
                    <label for="cardDescription">Description</label>
                    <textarea id="cardDescription" placeholder="Short description" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label for="cardFullDescription">Full Description</label>
                    <textarea id="cardFullDescription" placeholder="Detailed description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="cardPriority">Priority (1-5)</label>
                    <input type="number" id="cardPriority" min="1" max="5" value="3" required>
                </div>
                <div class="form-group">
                    <label for="cardColor">Color (Hex)</label>
                    <input type="text" id="cardColor" placeholder="#6496ff">
                </div>
                <div class="form-buttons">
                    <button type="submit" class="form-btn save-btn">Create Card</button>
                    <button type="button" class="form-btn cancel-btn" onclick="closeAddCardModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="addCategoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Create New Category</h2>
                <button class="modal-close" onclick="closeAddCategoryModal()">×</button>
            </div>
            <form onsubmit="saveNewCategory(event)" class="add-card-form">
                <div class="form-group">
                    <label for="categoryName">Category Name</label>
                    <input type="text" id="categoryName" required placeholder="Enter category name">
                </div>
                <div class="form-buttons">
                    <button type="submit" class="form-btn save-btn">Create Category</button>
                    <button type="button" class="form-btn cancel-btn" onclick="closeAddCategoryModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Local-only storage, no Google Sheets
        let allIdeas = [];
        let localCards = JSON.parse(localStorage.getItem('localCards')) || [];
        let localCategories = JSON.parse(localStorage.getItem('localCategories')) || [];
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        let ideaStatuses = JSON.parse(localStorage.getItem('ideaStatuses')) || {};
        let deletedItems = JSON.parse(localStorage.getItem('deletedItems')) || [];
        const activeFilters = new Map();
        let carouselIndices = {};

        function initializeIdeas() {
            // Everything is local to the website now
            allIdeas = [...localCards];
            renderIdeas();
        }

        function toggleFilter(type, value) {
            const key = `${type}-${value}`;
            const btn = document.querySelector(`[data-filter="${key}"]`);
            if (activeFilters.has(key)) {
                activeFilters.delete(key);
                btn.classList.remove('active');
            } else {
                activeFilters.set(key, true);
                btn.classList.add('active');
            }
            renderIdeas();
        }

        function filterIdeas() {
            return allIdeas.filter(idea => {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const matchesSearch = idea.name.toLowerCase().includes(searchTerm) || idea.description.toLowerCase().includes(searchTerm);

                const priorityFilters = Array.from(activeFilters.keys()).filter(k => k.startsWith('priority-'));
                const matchesPriority = priorityFilters.length === 0 || priorityFilters.some(f => f === `priority-P${idea.priority}`);

                const statusFilters = Array.from(activeFilters.keys()).filter(k => k.startsWith('status-'));
                const ideaStatus = ideaStatuses[idea.id] || 'IDEATING';
                const matchesStatus = statusFilters.length === 0 || statusFilters.some(f => f === `status-${ideaStatus}`);

                const viewFilters = Array.from(activeFilters.keys()).filter(k => k.startsWith('view-'));
                let matchesView = true;
                if (viewFilters.some(f => f === 'view-favorites')) {
                    matchesView = favorites.includes(idea.id);
                }

                return matchesSearch && matchesPriority && matchesStatus && matchesView;
            });
        }

        function sortIdeas(ideas) {
            const sorted = [...ideas];
            sorted.sort((a, b) => a.name.localeCompare(b.name));
            return sorted;
        }

        function groupByCategory(ideas) {
            return ideas.reduce((acc, idea) => {
                if (!acc[idea.category]) acc[idea.category] = [];
                acc[idea.category].push(idea);
                return acc;
            }, {});
        }

        function renderIdeas() {
            const filtered = filterIdeas();
            const sorted = sortIdeas(filtered);
            const content = document.getElementById('content');

            if (sorted.length === 0) {
                content.innerHTML = '<div class="empty-state"><p>No ideas match your filters.</p></div>';
                renderStats();
                return;
            }

            const grouped = groupByCategory(sorted);
            const categories = Object.keys(grouped).sort();

            const html = categories.map(category => {
                const ideas = grouped[category];
                const cardsHtml = ideas.map((idea, idx) => {
                    const isActive = idx === 0;
                    const isPrev = idx === ideas.length - 1;
                    const customStyle = idea.hexColor ? `--card-color: ${idea.hexColor};` : '';

                    return `
                        <div class="idea-card-carousel ${idea.brand} ${isActive ? 'active' : isPrev ? 'prev' : 'next'}" style="${customStyle}" onclick="openModal(event, '${idea.id}')">
                            <div class="idea-card-face">
                                <div class="card-header">
                                    <div class="card-name">${escapeHtml(idea.name)}</div>
                                    <div class="card-top-buttons">
                                        <button class="card-btn" onclick="cycleStatus(event, '${idea.id}')" title="Change status">
                                            ${ideaStatuses[idea.id] || 'IDEATING'}
                                        </button>
                                        <button class="card-btn favorite-btn" id="fav-${idea.id}" onclick="toggleFavorite(event, '${idea.id}')" title="Add to favorites">
                                            ${favorites.includes(idea.id) ? 'Favorited' : 'Favorite'}
                                        </button>
                                    </div>
                                </div>
                                <p class="card-description">${escapeHtml(idea.description)}</p>
                                ${idea.tags && idea.tags.length > 0 ? `
                                    <div class="card-tags">
                                        ${idea.tags.slice(0, 3).map(tag => `<span class="card-tag">${escapeHtml(tag)}</span>`).join('')}
                                    </div>
                                ` : ''}
                                <div class="card-meta">
                                    <div><strong>P${idea.priority}</strong></div>
                                </div>
                                <div class="card-footer">
                                    <div class="card-expand-hint">Click to expand</div>
                                    <button class="card-btn delete-btn" onclick="confirmDelete(event, '${idea.id}')" title="Delete card">Delete</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="carousel-section">
                        <div class="carousel-section-header">
                            <div class="carousel-section-title">${escapeHtml(category)}</div>
                            <div class="carousel-section-count">${ideas.length} ideas</div>
                        </div>
                        <div class="carousel-3d">
                            <div class="carousel-3d-inner" style="transform-style: preserve-3d;">
                                ${cardsHtml}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            content.innerHTML = html;

            // Apply custom colors from hex values
            document.querySelectorAll('.idea-card-carousel').forEach(card => {
                const onclickAttr = card.getAttribute('onclick');
                const idMatch = onclickAttr.match(/openModal\(event, '([^']+)'\)/);
                if (idMatch) {
                    const ideaId = idMatch[1];
                    const idea = allIdeas.find(i => i.id === ideaId);
                    if (idea && idea.hexColor) {
                        const face = card.querySelector('.idea-card-face');
                        if (face) {
                            const hex = idea.hexColor.replace('#', '');
                            const r = parseInt(hex.substring(0, 2), 16);
                            const g = parseInt(hex.substring(2, 4), 16);
                            const b = parseInt(hex.substring(4, 6), 16);

                            face.style.background = `linear-gradient(180deg, ${idea.hexColor} 0%, rgba(${r}, ${g}, ${b}, 0.1) 100%)`;
                            face.style.borderColor = `rgba(${r}, ${g}, ${b}, 0.3)`;

                            const luminance = getLuminance(idea.hexColor);
                            if (luminance > 0.5) {
                                face.classList.add('light-bg');
                            } else {
                                face.classList.add('dark-bg');
                            }
                        }
                    }
                }
            });

            // Add scroll listeners to all carousels
            document.querySelectorAll('.carousel-3d').forEach((carousel, idx) => {
                const categoryKey = categories[idx];
                if (!carouselIndices[categoryKey]) {
                    carouselIndices[categoryKey] = 0;
                }

                carousel.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const ideas = grouped[categoryKey];
                    const currentIdx = carouselIndices[categoryKey];

                    if (e.deltaY > 0 || e.deltaX > 0) {
                        carouselIndices[categoryKey] = (currentIdx + 1) % ideas.length;
                    } else {
                        carouselIndices[categoryKey] = (currentIdx - 1 + ideas.length) % ideas.length;
                    }

                    updateCarousel(carousel, ideas, carouselIndices[categoryKey]);
                });

                carousel.querySelectorAll('.idea-card-face').forEach(face => {
                    const card = face.closest('.idea-card-carousel');
                    face.addEventListener('mouseenter', () => {
                        card.classList.add('hovering');
                    });
                    face.addEventListener('mouseleave', () => {
                        card.classList.remove('hovering');
                    });

                    face.addEventListener('wheel', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        const ideas = grouped[categoryKey];
                        const currentIdx = carouselIndices[categoryKey];

                        if (e.deltaY > 0 || e.deltaX > 0) {
                            carouselIndices[categoryKey] = (currentIdx + 1) % ideas.length;
                        } else {
                            carouselIndices[categoryKey] = (currentIdx - 1 + ideas.length) % ideas.length;
                        }

                        updateCarousel(carousel, ideas, carouselIndices[categoryKey]);
                    });
                });
            });

            renderStats();
        }

        // ==================== ANIME.JS INTEGRATION ====================
        // Carousel transitions using CSS transitions for smooth animation
        function updateCarousel(carousel, ideas, activeIdx) {
            const cards = carousel.querySelectorAll('.idea-card-carousel');
            const totalCards = ideas.length;

            cards.forEach((card, idx) => {
                const offset = (idx - activeIdx + totalCards) % totalCards;

                let translateX = 0;
                let rotationAngle = 0;
                let zIndex = 0;

                if (offset === 0) {
                    translateX = 0;
                    rotationAngle = 0;
                    zIndex = totalCards;
                } else if (offset < totalCards / 2) {
                    translateX = -380;
                    rotationAngle = 45;
                    zIndex = totalCards - offset;
                } else {
                    translateX = 380;
                    rotationAngle = -45;
                    zIndex = totalCards - offset;
                }

                let depth;
                if (offset === 0) {
                    depth = 0;
                } else {
                    const distance = Math.min(offset, totalCards - offset);
                    depth = -distance * 50;
                }

                const opacity = offset === 0 ? 1 : 1;

                card.style.zIndex = zIndex;
                card.style.transform = `translateX(${translateX}px) rotateY(${rotationAngle}deg) translateZ(${depth}px)`;
                card.style.opacity = opacity;

                card.classList.remove('active');
                if (offset === 0) {
                    card.classList.add('active');
                }
            });
        }

        // ==================== Stat Counter Animation ====================
        function renderStats() {
            const total = allIdeas.length;
            const favorited = allIdeas.filter(i => favorites.includes(i.id)).length;
            const shipped = allIdeas.filter(i => (ideaStatuses[i.id] || 'IDEATING') === 'SHIPPED').length;
            const building = allIdeas.filter(i => (ideaStatuses[i.id] || 'IDEATING') === 'BUILDING').length;
            const ideating = allIdeas.filter(i => (ideaStatuses[i.id] || 'IDEATING') === 'IDEATING').length;

            const stats = [
                { value: total, label: 'Total Ideas' },
                { value: favorited, label: 'Favorites' },
                { value: shipped, label: 'Shipped' },
                { value: building, label: 'Building' },
                { value: ideating, label: 'Ideating' }
            ];

            // Render HTML
            document.getElementById('statsBar').innerHTML = stats.map((stat, idx) => `
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">${stat.label}</div>
                </div>
            `).join('');

            // Animate each stat number with simple counter
            const elements = document.querySelectorAll('.stat-number');
            stats.forEach((stat, idx) => {
                const element = elements[idx];
                if (!element) return;

                const startTime = Date.now() + (idx * 100);  // Stagger by 100ms
                const duration = 800;
                const target = stat.value;

                function updateCounter() {
                    const now = Date.now();
                    const elapsed = Math.max(0, now - startTime);
                    const progress = Math.min(1, elapsed / duration);

                    // Easing: easeOutQuad
                    const eased = 1 - Math.pow(1 - progress, 2);
                    const current = Math.round(eased * target);

                    element.textContent = current;

                    if (progress < 1) {
                        requestAnimationFrame(updateCounter);
                    }
                }

                updateCounter();
            });
        }

        // ==================== ANIME.JS: Modal Pop-In Animation ====================
        function openModal(event, id) {
            event.stopPropagation();
            const idea = allIdeas.find(i => i.id === id);
            if (!idea) return;

            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            const modalContent = modal.querySelector('.modal-content');

            const modalStatus = ideaStatuses[idea.id] || 'IDEATING';
            modalBody.innerHTML = `
                <div class="modal-meta-row">
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Status</div>
                        <div class="modal-meta-value">${modalStatus}</div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Priority</div>
                        <div class="modal-meta-value">P${idea.priority}</div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Difficulty</div>
                        <div class="modal-meta-value">${idea.metrics?.difficulty || 'Medium'}</div>
                    </div>
                </div>
                <div class="modal-description">${escapeHtml(idea.fullDescription)}</div>
                ${idea.tags && idea.tags.length > 0 ? `
                    <div class="modal-tags-section">
                        <span class="modal-tags-label">Skills Required</span>
                        <div class="modal-tags">
                            ${idea.tags.map(tag => `<span class="modal-tag">${escapeHtml(tag)}</span>`).join('')}
                        </div>
                    </div>
                ` : ''}
            `;

            modal.classList.add('active');

            // ANIME.JS: Smooth pop-in animation for modal
            anime({
                targets: modalContent,
                scale: [0.8, 1],
                opacity: [0, 1],
                duration: 400,
                easing: 'easeOutCubic'
            });
        }

        // ==================== ANIME.JS: Modal Pop-Out Animation ====================
        function closeModal() {
            const modal = document.getElementById('modal');
            const modalContent = modal.querySelector('.modal-content');

            anime({
                targets: modalContent,
                scale: [1, 0.8],
                opacity: [1, 0],
                duration: 300,
                easing: 'easeInCubic',
                complete: () => {
                    modal.classList.remove('active');
                }
            });
        }

        function toggleFavorite(event, ideaId) {
            event.stopPropagation();
            if (favorites.includes(ideaId)) {
                favorites = favorites.filter(id => id !== ideaId);
            } else {
                favorites.push(ideaId);
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            const btn = document.getElementById(`fav-${ideaId}`);
            if (btn) btn.textContent = favorites.includes(ideaId) ? 'Favorited' : 'Favorite';
            renderStats();
        }

        function cycleStatus(event, ideaId) {
            event.stopPropagation();
            const statuses = ['IDEATING', 'BUILDING', 'SHIPPED'];
            const current = ideaStatuses[ideaId] || 'IDEATING';
            const nextIdx = (statuses.indexOf(current) + 1) % statuses.length;
            ideaStatuses[ideaId] = statuses[nextIdx];
            localStorage.setItem('ideaStatuses', JSON.stringify(ideaStatuses));
            const btn = event.target.closest('.card-btn');
            if (btn) btn.textContent = statuses[nextIdx];
            renderStats();
        }

        function getLuminance(hexColor) {
            if (!hexColor) return 0.5;
            const hex = hexColor.replace('#', '');
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            return (0.299 * r + 0.587 * g + 0.114 * b) / 255;
        }

        function openAddCardModal() {
            const modal = document.getElementById('addCardModal');
            const categories = new Set();
            allIdeas.forEach(idea => categories.add(idea.category));
            localCategories.forEach(cat => categories.add(cat));

            const select = document.getElementById('cardCategory');
            select.innerHTML = '<option value="">Select or create category</option>';
            Array.from(categories).sort().forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                select.appendChild(opt);
            });

            modal.classList.add('active');
        }

        function closeAddCardModal() {
            document.getElementById('addCardModal').classList.remove('active');
            document.getElementById('cardName').value = '';
            document.getElementById('cardDescription').value = '';
            document.getElementById('cardFullDescription').value = '';
            document.getElementById('cardPriority').value = '3';
            document.getElementById('cardColor').value = '';
            document.getElementById('cardCategory').value = '';
        }

        function saveNewCard(event) {
            event.preventDefault();

            const category = document.getElementById('cardCategory').value || 'Other';
            const name = document.getElementById('cardName').value;
            const description = document.getElementById('cardDescription').value;
            const fullDescription = document.getElementById('cardFullDescription').value || description;
            const priority = parseInt(document.getElementById('cardPriority').value);
            const hexColor = document.getElementById('cardColor').value || null;

            const newCard = {
                id: `local-${Date.now()}`,
                category,
                name,
                description,
                fullDescription,
                priority,
                hexColor,
                brand: 'default',
                tags: [],
                metrics: { difficulty: 'Medium' }
            };

            localCards.push(newCard);
            localStorage.setItem('localCards', JSON.stringify(localCards));

            allIdeas.push(newCard);
            closeAddCardModal();
            renderIdeas();
        }

        function openAddCategoryModal() {
            document.getElementById('addCategoryModal').classList.add('active');
            document.getElementById('categoryName').value = '';
        }

        function closeAddCategoryModal() {
            document.getElementById('addCategoryModal').classList.remove('active');
        }

        function saveNewCategory(event) {
            event.preventDefault();

            const categoryName = document.getElementById('categoryName').value;
            if (!categoryName || localCategories.includes(categoryName)) {
                alert('Category already exists or is empty');
                return;
            }

            localCategories.push(categoryName);
            localStorage.setItem('localCategories', JSON.stringify(localCategories));

            closeAddCategoryModal();
            openAddCardModal();
            document.getElementById('cardCategory').value = categoryName;
        }

        function confirmDelete(event, ideaId) {
            event.stopPropagation();
            if (confirm(`Are you sure you want to delete this idea?`)) {
                deleteCard(ideaId);
            }
        }

        function deleteCard(ideaId) {
            const idea = allIdeas.find(i => i.id === ideaId);
            if (idea) {
                deletedItems.push({
                    id: idea.id,
                    name: idea.name,
                    category: idea.category,
                    data: idea
                });
                localStorage.setItem('deletedItems', JSON.stringify(deletedItems));
            }

            if (ideaId.startsWith('local-')) {
                localCards = localCards.filter(card => card.id !== ideaId);
                localStorage.setItem('localCards', JSON.stringify(localCards));
            }

            delete ideaStatuses[ideaId];
            favorites = favorites.filter(id => id !== ideaId);
            localStorage.setItem('ideaStatuses', JSON.stringify(ideaStatuses));
            localStorage.setItem('favorites', JSON.stringify(favorites));

            renderIdeas();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const container = document.querySelector('.container');
            sidebar.classList.toggle('collapsed');
            container.classList.toggle('sidebar-collapsed');
        }

        function showView(view) {
            const homeView = document.getElementById('homeView');
            const deletedView = document.getElementById('deletedView');
            const homeBtn = document.getElementById('homeBtn');
            const deletedBtn = document.getElementById('deletedBtn');

            if (view === 'home') {
                homeView.style.display = 'block';
                deletedView.style.display = 'none';
                homeBtn.classList.add('active');
                deletedBtn.classList.remove('active');
                renderIdeas();
            } else if (view === 'deleted') {
                homeView.style.display = 'none';
                deletedView.style.display = 'block';
                homeBtn.classList.remove('active');
                deletedBtn.classList.add('active');
                renderDeletedItems();
            }
        }

        function renderDeletedItems() {
            const deletedContent = document.getElementById('deletedContent');

            if (deletedItems.length === 0) {
                deletedContent.innerHTML = '<div class="empty-state"><p>No deleted ideas.</p></div>';
                return;
            }

            const html = deletedItems.map(item => `
                <div class="deleted-card-item">
                    <div class="deleted-card-info">
                        <div class="deleted-card-name">${escapeHtml(item.name)}</div>
                        <div class="deleted-card-category">${escapeHtml(item.category)}</div>
                    </div>
                    <div class="deleted-card-actions">
                        <button class="recover-btn" onclick="recoverCard('${item.id}')">Recover</button>
                        <button class="permanent-delete-btn" onclick="permanentlyDelete('${item.id}')">Delete Forever</button>
                    </div>
                </div>
            `).join('');

            deletedContent.innerHTML = html;
        }

        function recoverCard(ideaId) {
            const itemIdx = deletedItems.findIndex(item => item.id === ideaId);
            if (itemIdx !== -1) {
                const item = deletedItems[itemIdx];
                allIdeas.push(item.data);
                deletedItems.splice(itemIdx, 1);
                localStorage.setItem('deletedItems', JSON.stringify(deletedItems));
                renderDeletedItems();
                renderIdeas();
            }
        }

        function permanentlyDelete(ideaId) {
            if (confirm('Are you absolutely sure? This cannot be undone.')) {
                const itemIdx = deletedItems.findIndex(item => item.id === ideaId);
                if (itemIdx !== -1) {
                    deletedItems.splice(itemIdx, 1);
                    localStorage.setItem('deletedItems', JSON.stringify(deletedItems));
                    renderDeletedItems();
                }
            }
        }

        function refreshIdeas() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('loading');
            // Reload from localStorage and re-render
            localCards = JSON.parse(localStorage.getItem('localCards')) || [];
            initializeIdeas();
            btn.classList.remove('loading');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        document.getElementById('addCardModal').addEventListener('click', (e) => {
            if (e.target.id === 'addCardModal') closeAddCardModal();
        });

        document.getElementById('addCategoryModal').addEventListener('click', (e) => {
            if (e.target.id === 'addCategoryModal') closeAddCategoryModal();
        });

        initializeIdeas();
    </script>
</body>
</html>
